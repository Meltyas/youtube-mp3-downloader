<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → MP3</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --card2: #21252e;
      --border: #2a2e37;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #ff4b4b;
      --green: #2ecc71;
      --yellow: #f1c40f;
      --blue: #3498db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--muted); margin: 0 0 20px; font-size: 0.95rem; }
    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }
    .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }
    .hint { color: var(--muted); font-size: 0.85rem; }
    .link {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.85rem; padding: 4px; text-decoration: underline;
    }
    .link:hover { color: var(--text); }

    /* Ajustes */
    details.settings {
      margin-top: 14px; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px 14px;
    }
    details.settings summary { cursor: pointer; color: var(--muted); font-size: 0.9rem; padding: 8px 0; }
    .field { margin: 8px 0 14px; }
    .field label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; }
    .field input[type=text] {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 0.9rem; font-family: inherit;
    }
    .field input[type=number] {
      width: 80px; background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 0.9rem;
    }

    /* Cabecera del historial */
    .jobs-head {
      display: flex; justify-content: space-between; align-items: center;
      margin: 28px 0 12px;
    }
    .jobs-head h2 { font-size: 1.05rem; margin: 0; }
    .clear-all {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 14px; font-weight: 500; font-size: 0.85rem;
    }
    .clear-all:hover { border-color: var(--accent); color: var(--accent); }

    .jobs { display: flex; flex-direction: column; gap: 10px; }
    .job {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; display: flex; gap: 12px;
    }
    .thumb {
      width: 120px; height: 68px; flex-shrink: 0; border-radius: 8px;
      background: #000 center/cover no-repeat; object-fit: cover;
    }
    .job-body { flex: 1; min-width: 0; }
    .job-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; }
    .title { font-weight: 600; word-break: break-word; }
    .meta { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }
    .badge {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    .b-queued { background: #2a2e37; color: var(--muted); }
    .b-downloading { background: rgba(52,152,219,0.18); color: var(--blue); }
    .b-converting { background: rgba(241,196,15,0.18); color: var(--yellow); }
    .b-done { background: rgba(46,204,113,0.18); color: var(--green); }
    .b-error { background: rgba(255,75,75,0.18); color: var(--accent); }
    .bar { height: 6px; background: #2a2e37; border-radius: 999px; margin-top: 10px; overflow: hidden; }
    .bar > div { height: 100%; background: var(--blue); border-radius: 999px; transition: width 0.4s; }
    .bar.converting > div { background: var(--yellow); }
    .job-actions { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    .dl {
      display: inline-block; background: var(--green); color: #062; font-weight: 700;
      text-decoration: none; padding: 7px 14px; border-radius: 9px; font-size: 0.85rem;
    }
    .remove {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; font-weight: 500; font-size: 0.85rem;
    }
    .err { color: var(--accent); font-size: 0.82rem; margin-top: 6px; word-break: break-word; }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>YouTube <span>→</span> MP3</h1>
    <p class="sub">Pega una o varias URLs (una por línea). Vídeos o playlists — se descargan varias a la vez.</p>

    <textarea id="urls" placeholder="https://www.youtube.com/watch?v=...&#10;https://www.youtube.com/playlist?list=..."></textarea>
    <div class="row">
      <button id="add">Añadir a la cola</button>
      <span class="hint" id="hint"></span>
    </div>

    <details class="settings" id="settingsBox">
      <summary>⚙️ Ajustes (carpeta de destino y descargas simultáneas)</summary>
      <div class="field">
        <label for="outputDir">Carpeta donde se guardan los MP3</label>
        <input type="text" id="outputDir" placeholder="C:\Users\...\Music" />
      </div>
      <div class="field">
        <label for="concurrency">Descargas a la vez</label>
        <input type="number" id="concurrency" min="1" max="10" />
      </div>
      <div class="row">
        <button id="saveSettings">Guardar ajustes</button>
        <span class="hint" id="settingsHint"></span>
      </div>
    </details>

    <div class="jobs-head">
      <h2>Historial</h2>
      <button class="clear-all" id="clearAll">🗑 Borrar todo</button>
    </div>
    <div class="jobs" id="jobs"></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const jobsEl = $("#jobs");

    const STATUS = {
      queued: "En cola", downloading: "Descargando", converting: "Convirtiendo",
      done: "Listo", error: "Error",
    };

    // ---------- Ajustes ----------
    async function loadSettings() {
      try {
        const s = await (await fetch("/api/settings")).json();
        $("#outputDir").value = s.outputDir || "";
        $("#concurrency").value = s.concurrency || 3;
      } catch {}
    }
    async function saveSettings() {
      $("#saveSettings").disabled = true;
      $("#settingsHint").textContent = "Guardando…";
      try {
        const res = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            outputDir: $("#outputDir").value,
            concurrency: parseInt($("#concurrency").value, 10),
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error");
        $("#settingsHint").textContent = "✅ Guardado";
      } catch (e) {
        $("#settingsHint").textContent = e.message;
      } finally {
        $("#saveSettings").disabled = false;
        setTimeout(() => ($("#settingsHint").textContent = ""), 3000);
      }
    }

    // ---------- Cola ----------
    async function addJobs() {
      const urls = $("#urls").value;
      if (!urls.trim()) return;
      $("#add").disabled = true;
      $("#hint").textContent = "Analizando…";
      try {
        const res = await fetch("/api/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ urls }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error");
        $("#urls").value = "";
        $("#hint").textContent = `${data.added} añadido(s) a la cola.`;
        refresh();
      } catch (e) {
        $("#hint").textContent = e.message;
      } finally {
        $("#add").disabled = false;
        setTimeout(() => ($("#hint").textContent = ""), 3000);
      }
    }

    async function removeJob(id) {
      await fetch("/api/jobs/" + id, { method: "DELETE" });
      refresh();
    }
    async function clearAll() {
      if (!confirm("¿Borrar todo el historial? (los ficheros MP3 ya guardados no se borran)")) return;
      await fetch("/api/jobs", { method: "DELETE" });
      refresh();
    }

    function fmtDuration(s) {
      if (!s && s !== 0) return "";
      s = Math.round(s);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const p = (n) => String(n).padStart(2, "0");
      return h > 0 ? `${h}:${p(m)}:${p(sec)}` : `${m}:${p(sec)}`;
    }

    function render(jobs) {
      if (jobs.length === 0) {
        jobsEl.innerHTML = '<div class="empty">Aún no hay nada. Pega una URL arriba.</div>';
        return;
      }
      jobsEl.innerHTML = jobs.map((j) => {
        const showBar = j.status === "downloading" || j.status === "converting";
        const dur = fmtDuration(j.duration);
        const thumb = j.thumbnail
          ? `<img class="thumb" src="${j.thumbnail}" alt="" onerror="this.style.visibility='hidden'">`
          : `<div class="thumb"></div>`;
        return `
          <div class="job">
            ${thumb}
            <div class="job-body">
              <div class="job-top">
                <div>
                  <div class="title">${escapeHtml(j.title)}</div>
                  <div class="meta">${dur ? "⏱ " + dur : ""}</div>
                </div>
                <span class="badge b-${j.status}">${STATUS[j.status]}${
                  j.status === "downloading" ? " " + Math.round(j.progress) + "%" : ""
                }</span>
              </div>
              ${showBar ? `<div class="bar ${j.status === "converting" ? "converting" : ""}"><div style="width:${
                j.status === "converting" ? 100 : j.progress
              }%"></div></div>` : ""}
              ${j.error ? `<div class="err">${escapeHtml(j.error)}</div>` : ""}
              <div class="job-actions">
                ${j.status === "done" && j.file
                  ? `<a class="dl" href="/download/${j.id}" download>⬇ Descargar de nuevo</a>`
                  : ""}
                ${j.status !== "downloading" && j.status !== "converting"
                  ? `<button class="remove" onclick="removeJob(${j.id})">Quitar</button>`
                  : ""}
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    // ---------- Auto-descarga al terminar ----------
    const autoDownloaded = new Set();
    let firstLoad = true;

    function triggerDownload(id) {
      const a = document.createElement("a");
      a.href = "/download/" + id;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
    function autoDownload(jobs) {
      const done = jobs.filter((j) => j.status === "done" && j.file);
      if (firstLoad) {
        done.forEach((j) => autoDownloaded.add(j.id));
        firstLoad = false;
        return;
      }
      done.forEach((j, i) => {
        if (!autoDownloaded.has(j.id)) {
          autoDownloaded.add(j.id);
          setTimeout(() => triggerDownload(j.id), i * 400);
        }
      });
    }

    async function refresh() {
      try {
        const jobs = await (await fetch("/api/jobs")).json();
        render(jobs);
        autoDownload(jobs);
      } catch {}
    }

    $("#add").addEventListener("click", addJobs);
    $("#saveSettings").addEventListener("click", saveSettings);
    $("#clearAll").addEventListener("click", clearAll);
    window.removeJob = removeJob;
    loadSettings();
    refresh();
    setInterval(refresh, 1500);
  </script>
</body>
</html>
